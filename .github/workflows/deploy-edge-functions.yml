name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'integrations/**'

# Auto-deploys Supabase Edge Functions when their source under integrations/<name>/
# changes on main. Detects which functions changed and deploys only those.
# Requires repo secret SUPABASE_ACCESS_TOKEN (account-level PAT from Supabase Dashboard
# -> Account -> Access Tokens).
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: jzgghvuurztjhunxbuby
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect and deploy changed functions
        run: |
          set -euo pipefail
          # Find function names whose files changed in this push
          CHANGED=$(git diff --name-only HEAD^ HEAD \
            | grep '^integrations/[^/]\+/' \
            | cut -d/ -f2 \
            | sort -u || true)
          if [ -z "$CHANGED" ]; then
            echo "No edge function changes detected."
            exit 0
          fi
          for fn in $CHANGED; do
            if [ ! -f "integrations/$fn/index.ts" ]; then
              echo "Skipping $fn (no index.ts found)"
              continue
            fi
            echo "::group::Deploy $fn"
            # Supabase CLI expects functions under supabase/functions/<name>/.
            # Stage the files into that layout for the deploy step.
            mkdir -p "supabase/functions/$fn"
            cp -r "integrations/$fn/".* "supabase/functions/$fn/" 2>/dev/null || true
            cp -r "integrations/$fn/"* "supabase/functions/$fn/"
            supabase functions deploy "$fn" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt
            echo "::endgroup::"
          done
